<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisochnik — Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: white; overflow-x: hidden;
            background: #000 url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }

        .lang-switcher {
            position: absolute; top: 20px; left: 20px;
            display: flex; gap: 10px; z-index: 10;
        }
        .lang-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 6px 14px; border-radius: 10px;
            cursor: pointer; font-size: 0.85rem; transition: 0.3s;
            font-weight: bold; backdrop-filter: blur(5px);
        }
        .lang-btn:hover, .lang-btn.active { background: white; color: black; }

        .card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 40px;
            width: 90%; max-width: 360px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 2.5rem; margin: 0 0 5px 0; letter-spacing: 3px; font-weight: 900; }
        .subtitle { color: #ccc; margin-bottom: 30px; font-size: 1rem; }

        .links-list { display: flex; flex-direction: column; gap: 12px; }
        .link-item {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px; border-radius: 20px; text-decoration: none;
            font-weight: 600; transition: 0.3s ease; color: white;
        }

        .youtube { background: #FF0000; }
        .telegram { background: #24A1DE; }
        .tiktok { background: #010101; border: 1px solid #444; }
        .instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .donate { background: #FFD700; color: #000; margin-top: 5px; }

        .authors-container { margin-top: 25px; }
        .authors-trigger {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px; border-radius: 15px; cursor: pointer;
            transition: 0.3s; font-size: 0.9rem; font-weight: bold;
        }
        .authors-content {
            max-height: 0; overflow: hidden; opacity: 0;
            transition: all 0.5s ease;
            display: flex; flex-direction: column; gap: 10px;
        }
        .authors-container:hover .authors-content { max-height: 400px; opacity: 1; margin-top: 15px; }
        
        .author-box {
            background: rgba(255, 255, 255, 0.05); padding: 15px;
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }
        .author-name { font-weight: bold; display: block; margin-bottom: 10px; text-align: center; font-size: 0.9rem; }
        .author-btns { display: flex; gap: 8px; justify-content: center; }
        .author-link {
            padding: 8px 12px; border-radius: 10px; text-decoration: none;
            color: white; font-size: 0.75rem; display: flex; align-items: center; gap: 6px;
            transition: 0.3s;
        }

        .link-item:hover, .author-link:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .footer { margin-top: 30px; font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="setLanguage('ua')">UA</button>
        <button class="lang-btn active" onclick="setLanguage('ru')">RU</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>

    <div class="card">
        <h1>KISOCHNIK</h1>
        <p id="txt-subtitle" class="subtitle">Мир забавных животных 🐾</p>

        <div class="links-list">
            <a href="https://www.youtube.com/channel/UCcUM-5FW6UADhURPDd9efoA" class="link-item youtube" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://t.me/kisochnik" class="link-item telegram" target="_blank">
                <i class="fab fa-telegram"></i> Telegram
            </a>
            <a href="https://www.tiktok.com/@kisochnik_" class="link-item tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://www.instagram.com/kisochnik2026/" class="link-item instagram" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://donatello.to/kryptosi" class="link-item donate" target="_blank">
                <i class="fas fa-coins"></i> <span id="txt-donate">Поддержать</span>
            </a>
        </div>

        <div class="authors-container">
            <div class="authors-trigger" id="txt-authors-btn">👤 Авторы проекта</div>
            <div class="authors-content">
                <div class="author-box">
                    <span class="author-name">Denchik</span>
                    <div class="author-btns">
                        <a href="https://www.instagram.com/denchik_denchik06/" class="author-link" style="background: #E1306C;" target="_blank">
                            <i class="fab fa-instagram"></i> Instagram
                        </a>
                    </div>
                </div>
                <div class="author-box">
                    <span class="author-name">Dani_l</span>
                    <div class="author-btns">
                        <a href="https://www.instagram.com/dani_l4434?igsh=enQ4NnRna3lkanVu" class="author-link" style="background: #E1306C;" target="_blank">
                            <i class="fab fa-instagram"></i> Instagram
                        </a>
                        <a href="https://www.tiktok.com/@bomjcoladun?_r=1&_t=ZS-94s2Z7oEfSL" class="author-link" style="background: #010101; border: 1px solid #444;" target="_blank">
                            <i class="fab fa-tiktok"></i> TikTok
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div id="txt-footer" class="footer">© 2026 КОМАНДА KISOCHNIK</div>
    </div>

    <script>
        const translations = {
            ru: { subtitle: "Мир забавных животных 🐾", donate: "Поддержать", authorsBtn: "👤 Авторы проекта", footer: "© 2026 КОМАНДА KISOCHNIK" },
            ua: { subtitle: "Світ кумедних тварин 🐾", donate: "Підтримати", authorsBtn: "👤 Автори проекту", footer: "© 2026 КОМАНДА KISOCHNIK" },
            en: { subtitle: "Funny animals world 🐾", donate: "Support Us", authorsBtn: "👤 Project Authors", footer: "© 2026 KISOCHNIK TEAM" }
        };

        function setLanguage(lang) {
            document.getElementById('txt-subtitle').innerText = translations[lang].subtitle;
            document.getElementById('txt-donate').innerText = translations[lang].donate;
            document.getElementById('txt-authors-btn').innerText = translations[lang].authorsBtn;
            document.getElementById('txt-footer').innerText = translations[lang].footer;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === lang) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
